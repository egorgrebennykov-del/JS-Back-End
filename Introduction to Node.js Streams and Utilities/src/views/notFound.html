<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/site.css">
    <link rel="shortcut icon" href="https://img.icons8.com/ios-filled/50/000000/cat-footprint.png" type="image/png">
    <title>Cat Shelter - 404</title>
</head>

<body>
    <header>
        <nav>
            <ul class="navigation">
                <li><a href="/">Home Page</a></li>
                <li><a href="/cats/add-breed">Add Breed</a></li>
                <li><a href="/cats/add-cat">Add Cat</a></li>
            </ul>
        </nav>
        <h1>Cat Shelter</h1>
        <form action="/search">
            <input type="text">
            <button type="button">Search</button>
        </form>
    </header>

    <main>
        <section class="cats">
            <div style="text-align:center; padding: 60px;">
                <h2 style="font-size: 48px; color: #ff6b6b;">404</h2>
                <h3>Cat Not Found 🐱</h3>
                <p>Looks like this cat ran away or never existed.</p>
                <p>You can go back to the <a href="/">Home Page</a> and try again.</p>

                <div style="margin-top: 30px;">
                    <img 
                        src="https://cdn.pixabay.com/photo/2017/11/09/21/41/cat-2934720_1280.jpg" 
                        alt="Sad cat"
                        style="max-width: 400px; width: 100%; border-radius: 12px;"
                    >
                </div>
            </div>
        </section>
    </main>

</body>

</html>
